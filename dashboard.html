<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据看板 / Data Command</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#0a0a0f;
    --bg-card:rgba(15,15,25,0.85);
    --bg-card-hover:rgba(20,20,35,0.95);
    --border:rgba(80,200,255,0.08);
    --border-glow:rgba(80,200,255,0.25);
    --text-primary:#e8ecf4;
    --text-secondary:#7a8599;
    --text-muted:#4a5568;
    --accent-cyan:#00d4ff;
    --accent-violet:#8b5cf6;
    --accent-rose:#f43f5e;
    --accent-amber:#f59e0b;
    --accent-emerald:#10b981;
    --accent-cyan-dim:rgba(0,212,255,0.12);
    --accent-violet-dim:rgba(139,92,246,0.12);
    --accent-rose-dim:rgba(244,63,94,0.12);
    --accent-amber-dim:rgba(245,158,11,0.12);
    --accent-emerald-dim:rgba(16,185,129,0.12);
    --radius:12px;
    --radius-sm:8px;
    --shadow:0 4px 24px rgba(0,0,0,0.4);
    --font-display:'Outfit',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  html{font-size:16px;-webkit-font-smoothing:antialiased}
  body{
    font-family:var(--font-display);
    background:var(--bg-primary);
    color:var(--text-primary);
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%,rgba(0,212,255,0.06),transparent),
      radial-gradient(ellipse 60% 40% at 80% 80%,rgba(139,92,246,0.05),transparent),
      radial-gradient(ellipse 50% 50% at 50% 50%,rgba(244,63,94,0.03),transparent);
    pointer-events:none;
  }
  #app{position:relative;z-index:1}
  .dashboard-shell{max-width:1440px;margin:0 auto;padding:24px 28px 48px}

  /* Header */
  .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:16px}
  .dash-header h1{font-size:1.75rem;font-weight:700;letter-spacing:-0.03em;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .dash-header .subtitle{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);letter-spacing:0.04em;margin-top:4px}
  .header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .live-badge{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.7rem;color:var(--accent-emerald);text-transform:uppercase;letter-spacing:0.08em}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-emerald);box-shadow:0 0 8px var(--accent-emerald);animation:pulse-dot 2s ease-in-out infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
  .clock{font-family:var(--font-mono);font-size:0.85rem;color:var(--text-secondary);letter-spacing:0.02em;background:var(--bg-card);border:1px solid var(--border);padding:6px 14px;border-radius:var(--radius-sm)}
  .reset-btn{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s}
  .reset-btn:hover{color:var(--accent-cyan);border-color:var(--accent-cyan)}

  /* Tab Bar */
  .tab-bar{display:flex;align-items:center;gap:0;margin-bottom:28px;position:relative;border-bottom:1px solid var(--border)}
  .tab-item{padding:12px 24px;font-size:0.82rem;font-weight:500;color:var(--text-muted);cursor:pointer;position:relative;transition:color 0.3s;letter-spacing:0.01em;user-select:none;white-space:nowrap}
  .tab-item:hover{color:var(--text-secondary)}
  .tab-item.active{color:var(--accent-cyan)}
  .tab-item .tab-en{font-family:var(--font-mono);font-size:0.6rem;display:block;margin-top:2px;opacity:0.5;letter-spacing:0.04em}
  .tab-indicator{position:absolute;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-violet));border-radius:2px;transition:left 0.35s cubic-bezier(0.4,0,0.2,1),width 0.35s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px rgba(0,212,255,0.3)}
  .tab-content{animation:tabFadeIn 0.4s cubic-bezier(0.4,0,0.2,1)}
  @keyframes tabFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* Draggable */
  .drag-container{display:contents}
  .draggable{cursor:grab;transition:all 0.25s cubic-bezier(0.4,0,0.2,1)}
  .draggable:active,.dragging{cursor:grabbing}
  .drag-placeholder{border:2px dashed var(--accent-cyan)!important;opacity:0.4;background:rgba(0,212,255,0.05)!important}
  .drag-over{border-color:var(--accent-cyan)!important;background:var(--accent-cyan-dim)!important}
  .dragging{opacity:0.85;transform:scale(1.02);box-shadow:var(--shadow),0 0 20px rgba(0,212,255,0.15);z-index:100;position:relative}

  /* KPI Cards */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(12px)}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.35s}
  .kpi-card:hover{border-color:var(--border-glow);background:var(--bg-card-hover);transform:translateY(-2px);box-shadow:var(--shadow)}
  .kpi-card:hover::before{opacity:1}
  .kpi-card.cyan::before{background:linear-gradient(90deg,var(--accent-cyan),transparent)}
  .kpi-card.violet::before{background:linear-gradient(90deg,var(--accent-violet),transparent)}
  .kpi-card.rose::before{background:linear-gradient(90deg,var(--accent-rose),transparent)}
  .kpi-card.amber::before{background:linear-gradient(90deg,var(--accent-amber),transparent)}
  .kpi-card.emerald::before{background:linear-gradient(90deg,var(--accent-emerald),transparent)}
  .kpi-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:14px}
  .kpi-card.cyan .kpi-icon{background:var(--accent-cyan-dim);color:var(--accent-cyan)}
  .kpi-card.violet .kpi-icon{background:var(--accent-violet-dim);color:var(--accent-violet)}
  .kpi-card.rose .kpi-icon{background:var(--accent-rose-dim);color:var(--accent-rose)}
  .kpi-card.amber .kpi-icon{background:var(--accent-amber-dim);color:var(--accent-amber)}
  .kpi-card.emerald .kpi-icon{background:var(--accent-emerald-dim);color:var(--accent-emerald)}
  .kpi-label{font-size:0.75rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .kpi-value{font-size:1.65rem;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
  .kpi-change{display:inline-flex;align-items:center;gap:3px;font-family:var(--font-mono);font-size:0.7rem;margin-top:8px;padding:2px 8px;border-radius:20px}
  .kpi-change.up{background:var(--accent-emerald-dim);color:var(--accent-emerald)}
  .kpi-change.down{background:var(--accent-rose-dim);color:var(--accent-rose)}

  /* Chart Panels */
  .chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
  .chart-grid.equal{grid-template-columns:1fr 1fr}
  .chart-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;backdrop-filter:blur(12px);transition:border-color 0.3s}
  .chart-panel:hover{border-color:var(--border-glow)}
  .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .panel-title{font-size:0.9rem;font-weight:600;letter-spacing:-0.01em}
  .panel-badge{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:0.04em;background:rgba(255,255,255,0.04);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
  .chart-wrap{position:relative;width:100%;height:260px}
  .chart-wrap canvas{width:100%!important;height:100%!important}

  /* Bottom Grid */
  .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  /* Data Table */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
  thead th:hover{color:var(--text-secondary)}
  thead th .sort-arrow{margin-left:4px;font-size:0.6rem;opacity:0.5}
  thead th.active .sort-arrow{opacity:1;color:var(--accent-cyan)}
  tbody td{font-size:0.82rem;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.03);font-variant-numeric:tabular-nums}
  tbody tr{transition:background 0.2s}
  tbody tr:hover{background:rgba(255,255,255,0.02)}
  .status-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.7rem;font-weight:500}
  .status-pill.active{background:var(--accent-emerald-dim);color:var(--accent-emerald)}
  .status-pill.pending{background:var(--accent-amber-dim);color:var(--accent-amber)}
  .status-pill.inactive{background:var(--accent-rose-dim);color:var(--accent-rose)}
  .status-pill.critical{background:var(--accent-rose-dim);color:var(--accent-rose)}
  .status-pill.warning{background:var(--accent-amber-dim);color:var(--accent-amber)}
  .status-pill.info{background:var(--accent-cyan-dim);color:var(--accent-cyan)}
  .status-pill.resolved{background:var(--accent-emerald-dim);color:var(--accent-emerald)}
  .status-pill.vip{background:var(--accent-violet-dim);color:var(--accent-violet)}

  /* Activity Feed */
  .activity-list{list-style:none;display:flex;flex-direction:column;gap:0}
  .activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
  .activity-item:last-child{border-bottom:none}
  .activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .activity-dot.cyan{background:var(--accent-cyan);box-shadow:0 0 6px var(--accent-cyan-dim)}
  .activity-dot.violet{background:var(--accent-violet);box-shadow:0 0 6px var(--accent-violet-dim)}
  .activity-dot.rose{background:var(--accent-rose);box-shadow:0 0 6px var(--accent-rose-dim)}
  .activity-dot.amber{background:var(--accent-amber);box-shadow:0 0 6px var(--accent-amber-dim)}
  .activity-dot.emerald{background:var(--accent-emerald);box-shadow:0 0 6px var(--accent-emerald-dim)}
  .activity-text{font-size:0.8rem;color:var(--text-secondary);line-height:1.5}
  .activity-text strong{color:var(--text-primary);font-weight:500}
  .activity-time{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);margin-top:2px}

  /* Progress Bars */
  .progress-section{margin-top:4px}
  .progress-item{margin-bottom:16px}
  .progress-item:last-child{margin-bottom:0}
  .progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .progress-label{font-size:0.78rem;color:var(--text-secondary)}
  .progress-val{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-primary)}
  .progress-track{width:100%;height:5px;border-radius:10px;background:rgba(255,255,255,0.05);overflow:hidden}
  .progress-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}
  .progress-fill.cyan{background:linear-gradient(90deg,var(--accent-cyan),rgba(0,212,255,0.5))}
  .progress-fill.violet{background:linear-gradient(90deg,var(--accent-violet),rgba(139,92,246,0.5))}
  .progress-fill.rose{background:linear-gradient(90deg,var(--accent-rose),rgba(244,63,94,0.5))}
  .progress-fill.amber{background:linear-gradient(90deg,var(--accent-amber),rgba(245,158,11,0.5))}
  .progress-fill.emerald{background:linear-gradient(90deg,var(--accent-emerald),rgba(16,185,129,0.5))}

  /* Rank number */
  .rank-num{font-family:var(--font-mono);font-weight:600;font-size:0.78rem;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px}
  .rank-num.top3{background:var(--accent-amber-dim);color:var(--accent-amber)}
  .rank-num.normal{background:rgba(255,255,255,0.04);color:var(--text-muted)}

  /* Alert list */
  .alert-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);transition:background 0.2s}
  .alert-item:last-child{margin-bottom:0}
  .alert-item:hover{background:rgba(255,255,255,0.04)}
  .alert-icon{font-size:1rem;flex-shrink:0}
  .alert-body{flex:1;min-width:0}
  .alert-title{font-size:0.8rem;font-weight:500;margin-bottom:2px}
  .alert-desc{font-size:0.72rem;color:var(--text-muted)}
  .alert-meta{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);text-align:right;white-space:nowrap}

  /* Responsive */
  @media(max-width:1100px){
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .chart-grid,.chart-grid.equal{grid-template-columns:1fr}
    .bottom-grid{grid-template-columns:1fr}
  }
  @media(max-width:640px){
    .dashboard-shell{padding:16px 12px 32px}
    .kpi-grid{grid-template-columns:1fr}
    .dash-header h1{font-size:1.35rem}
    .kpi-value{font-size:1.35rem}
    .chart-wrap{height:200px}
    .tab-item{padding:10px 14px;font-size:0.76rem}
    .tab-item .tab-en{display:none}
  }

  /* Entrance */
  .fade-up{opacity:0;transform:translateY(16px);animation:fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  .delay-1{animation-delay:0.08s}.delay-2{animation-delay:0.16s}
  .delay-3{animation-delay:0.24s}.delay-4{animation-delay:0.32s}
  .delay-5{animation-delay:0.40s}.delay-6{animation-delay:0.48s}
  .delay-7{animation-delay:0.56s}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
</style>
</head>
<body>
<div id="app">
  <div class="dashboard-shell">
    <!-- Header -->
    <header class="dash-header fade-up">
      <div>
        <h1>数据指挥中心</h1>
        <div class="subtitle">DATA COMMAND CENTER — REAL-TIME ANALYTICS</div>
      </div>
      <div class="header-right">
        <button class="reset-btn" @click="resetLayout">⟲ 重置布局</button>
        <div class="live-badge"><span class="live-dot"></span> LIVE</div>
        <div class="clock">{{ currentTime }}</div>
      </div>
    </header>

    <!-- Tab Bar -->
    <nav class="tab-bar fade-up delay-1" ref="tabBarRef">
      <div v-for="tab in tabs" :key="tab.key" class="tab-item" :class="{active: activeTab===tab.key}" :ref="el => { if(el) tabRefs[tab.key]=el }" @click="switchTab(tab.key)">
        {{ tab.label }}
        <span class="tab-en">{{ tab.en }}</span>
      </div>
      <div class="tab-indicator" :style="indicatorStyle"></div>
    </nav>

    <!-- ==================== OVERVIEW ==================== -->
    <div v-if="activeTab==='overview'" class="tab-content" :key="'overview'">
      <!-- KPI -->
      <section class="kpi-grid">
        <template v-for="(idx, i) in layouts.overview.kpi" :key="'ov-kpi-'+i">
          <div v-if="getKpiByIndex('overview', idx)" class="kpi-card draggable" :class="[getKpiByIndex('overview', idx).color, draggingItem==='overview-kpi-'+idx?'dragging':'']" :draggable="true" @dragstart="onDragStart($event, 'overview', 'kpi', idx)" @dragend="onDragEnd" @dragover.prevent @drop="onDrop($event, 'overview', 'kpi', idx)" :style="draggingItem&&draggingItem!=='overview-kpi-'+idx?{opacity:0.5}:{}">
            <div class="kpi-icon">{{ getKpiByIndex('overview', idx).icon }}</div>
            <div class="kpi-label">{{ getKpiByIndex('overview', idx).label }}</div>
            <div class="kpi-value">{{ getKpiByIndex('overview', idx).display }}</div>
            <span class="kpi-change" :class="getKpiByIndex('overview', idx).dir">{{ getKpiByIndex('overview', idx).dir==='up'?'▲':'▼' }} {{ getKpiByIndex('overview', idx).change }}</span>
          </div>
        </template>
      </section>
      <!-- Charts -->
      <section class="chart-grid">
        <template v-for="(idx, i) in layouts.overview.chart" :key="'ov-chart-'+i">
          <div v-if="getChartByIndex('overview', idx)" class="chart-panel draggable" :class="draggingItem==='overview-chart-'+idx?'dragging':''" :draggable="true" @dragstart="onDragStart($event, 'overview', 'chart', idx)" @dragend="onDragEnd" @dragover.prevent @drop="onDrop($event, 'overview', 'chart', idx)" :style="draggingItem&&draggingItem!=='overview-chart-'+idx?{opacity:0.5}:{}">
            <div class="panel-header">
              <span class="panel-title">{{ getChartByIndex('overview', idx).title }}</span>
              <span class="panel-badge">{{ getChartByIndex('overview', idx).badge }}</span>
            </div>
            <div class="chart-wrap"><canvas :ref="el => setChartRef('overview', idx, el)"></canvas></div>
          </div>
        </template>
      </section>
      <!-- Bottom -->
      <section class="bottom-grid">
        <template v-for="(idx, i) in layouts.overview.bottom" :key="'ov-bottom-'+i">
          <div v-if="getBottomByIndex('overview', idx)" class="chart-panel draggable" :class="draggingItem==='overview-bottom-'+idx?'dragging':''" :draggable="true" @dragstart="onDragStart($event, 'overview', 'bottom', idx)" @dragend="onDragEnd" @dragover.prevent @drop="onDrop($event, 'overview', 'bottom', idx)" :style="draggingItem&&draggingItem!=='overview-bottom-'+idx?{opacity:0.5}:{}">
            <template v-if="idx===0">
              <div class="panel-header"><span class="panel-title">项目概览 / Projects</span><span class="panel-badge">{{ overviewProjects.length }} 项</span></div>
              <div class="table-wrap">
                <table>
                  <thead><tr><th v-for="c in overviewCols" :key="c.key" :class="{active:overviewSort.key===c.key}" @click="toggleOverviewSort(c.key)">{{ c.label }}<span class="sort-arrow">{{ overviewSort.key===c.key?(overviewSort.asc?'▲':'▼'):'⇅' }}</span></th></tr></thead>
                  <tbody><tr v-for="p in sortedOverviewProjects" :key="p.name"><td><strong>{{ p.name }}</strong></td><td>{{ p.lead }}</td><td><span class="status-pill" :class="p.status">{{ statusText(p.status) }}</span></td><td style="font-family:var(--font-mono)">¥{{ p.budget.toLocaleString() }}</td><td style="font-family:var(--font-mono)">{{ p.progress }}%</td></tr></tbody>
                </table>
              </div>
            </template>
            <template v-else-if="idx===1">
              <div class="panel-header"><span class="panel-title">实时动态 / Activity</span></div>
              <ul class="activity-list">
                <li v-for="(a,i) in overviewActivity" :key="i" class="activity-item"><span class="activity-dot" :class="a.color"></span><div><div class="activity-text" v-html="a.text"></div><div class="activity-time">{{ a.time }}</div></div></li>
              </ul>
              <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05)">
                <div class="panel-header" style="margin-bottom:14px"><span class="panel-title">目标进度 / Goals</span></div>
                <div class="progress-section"><div v-for="g in overviewGoals" :key="g.label" class="progress-item"><div class="progress-meta"><span class="progress-label">{{ g.label }}</span><span class="progress-val">{{ g.value }}%</span></div><div class="progress-track"><div class="progress-fill" :class="g.color" :style="{width:mounted?g.value+'%':'0%'}"></div></div></div></div>
              </div>
            </template>
          </div>
        </template>
      </section>
    </div>

    <!-- ==================== SALES ==================== -->
    <div v-if="activeTab==='sales'" class="tab-content" :key="'sales'">
      <section class="kpi-grid">
        <template v-for="(idx, i) in layouts.sales.kpi" :key="'s-kpi-'+i">
          <div v-if="getKpiByIndex('sales', idx)" class="kpi-card draggable" :class="[getKpiByIndex('sales', idx).color, draggingItem==='sales-kpi-'+idx?'dragging':'']" :draggable="true" @dragstart="onDragStart($event, 'sales', 'kpi', idx)" @dragend="onDragEnd" @dragover.prevent @drop="onDrop($event, 'sales', 'kpi', idx)" :style="draggingItem&&draggingItem!=='sales-kpi-'+idx?{opacity:0.5}:{}">
            <div class="kpi-icon">{{ getKpiByIndex('sales', idx).icon }}</div>

                <ul class="activity-list"><li v-for="(d,i) in opsDeployments" :key="i" class="activity-item"><span class="activity-dot" :class="d.color"></span><div><div class="activity-text" v-html="d.text"></div><div class="activity-time">{{ d.time }}</div></div></li></ul>

<script>
const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

createApp({
  setup() {
    const mounted = ref(false);
    const currentTime = ref('');
    let clockTimer = null;
    const draggingItem = ref(null);
    const dragSource = reactive({ tab: null, type: null, index: null });

    // Tab state
    const tabs = [{ key:'overview', label:'概览', en:'OVERVIEW' },{ key:'sales', label:'销售', en:'SALES' },{ key:'users', label:'用户', en:'USERS' },{ key:'ops', label:'运营', en:'OPERATIONS' }];
    const activeTab = ref('overview');
    const tabRefs = reactive({});
    const tabBarRef = ref(null);
    const indicatorStyle = ref({ left:'0px', width:'0px' });

    // Layout state - each tab has kpi, chart, bottom arrays
    const defaultLayouts = {
      overview: { kpi:[0,1,2,3], chart:[0,1], bottom:[0,1] },
      sales: { kpi:[0,1,2,3], chart:[0,1], bottom:[0,1] },
      users: { kpi:[0,1,2,3], chart:[0,1], bottom:[0,1] },
      ops: { kpi:[0,1,2,3], chart:[0,1], bottom:[0,1] }
    };

    function loadLayouts() {
      try {
        const saved = localStorage.getItem('dashboard_layouts');
        return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultLayouts));
      } catch { return JSON.parse(JSON.stringify(defaultLayouts)); }
    }
    function saveLayouts() {
      localStorage.setItem('dashboard_layouts', JSON.stringify(layouts));
    }

    const layouts = reactive(loadLayouts());

    function resetLayout() {
      Object.assign(layouts, JSON.parse(JSON.stringify(defaultLayouts)));
      saveLayouts();
      nextTick(() => initChartsForTab(activeTab.value));
    }

    // Drag handlers
    function onDragStart(e, tab, type, index) {
      draggingItem.value = `${tab}-${type}-${index}`;
      dragSource.tab = tab;
      dragSource.type = type;
      dragSource.index = index;
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragEnd() {
      draggingItem.value = null;
      dragSource.tab = null;
      dragSource.type = null;
      dragSource.index = null;
    }
    function onDrop(e, tab, type, targetIndex) {
      if (!dragSource.tab || dragSource.tab !== tab || dragSource.type !== type) return;
      const arr = layouts[tab][type];
      const fromIdx = dragSource.index;
      const toIdx = targetIndex;
      if (fromIdx === toIdx) return;
      // Swap
      const temp = arr[fromIdx];
      arr[fromIdx] = arr[toIdx];
      arr[toIdx] = temp;
      saveLayouts();
      // Reinit charts after layout change
      nextTick(() => initChartsForTab(tab));
    }

    function getKpiByIndex(tab, idx) {
      const data = { overview:overviewKpis, sales:salesKpis, users:usersKpis, ops:opsKpis }[tab];
      return data.value[idx] || null;
    }
    function getChartByIndex(tab, idx) {
      const map = {
        overview:[{title:'营收趋势 / Revenue Trend',badge:'近 12 个月'},{title:'渠道分布 / Channels',badge:'本季度'}],
        sales:[{title:'月度销售额 / Monthly Sales',badge:'近 12 个月'},{title:'区域分布 / Regional',badge:'本季度'}],
        users:[{title:'用户增长 / User Growth',badge:'近 12 个月'},{title:'用户画像 / User Profile',badge:'综合评分'}],
        ops:[{title:'响应时间 / Response Time',badge:'近 24 小时'},{title:'错误类型 / Error Types',badge:'本周'}]
      };
      return map[tab]?.[idx] || null;
    }
    function getBottomByIndex(tab, idx) { return idx < 2 ? { exists:true } : null; }

    function updateIndicator() {
      const el = tabRefs[activeTab.value];
      if (!el) return;
      indicatorStyle.value = { left: el.offsetLeft + 'px', width: el.offsetWidth + 'px' };
    }

    const chartInstances = {};
    function destroyCharts() {
      Object.keys(chartInstances).forEach(k => { if (chartInstances[k]) { chartInstances[k].destroy(); delete chartInstances[k]; } });
    }

    function switchTab(key) {
      if (activeTab.value === key) return;
      destroyCharts();
      activeTab.value = key;
      nextTick(() => { updateIndicator(); initChartsForTab(key); });
    }

    // Chart refs storage
    const chartRefs = reactive({});
    function setChartRef(tab, idx, el) {
      if (!chartRefs[tab]) chartRefs[tab] = {};
      chartRefs[tab][idx] = el;
    }

    function initChartsForTab(tab) {
      const layout = layouts[tab];
      // For each chart position, check if there's a canvas and init
      layout.chart.forEach((origIdx, displayIdx) => {
        const canvas = chartRefs[tab]?.[displayIdx];
        if (canvas) {
          const ctx = canvas.getContext('2d');
          if (tab === 'overview') initOverviewChart(ctx, origIdx);
          else if (tab === 'sales') initSalesChart(ctx, origIdx);
          else if (tab === 'users') initUsersChart(ctx, origIdx);
          else if (tab === 'ops') initOpsChart(ctx, origIdx);
        }
      });
    }

    // Chart init functions (reuse from original, adapted)
    function baseLineOpts(extra={}) {
      return { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{ legend:{display:true,position:'top',align:'end',labels:{color:'#7a8599',font:{family:'JetBrains Mono',size:10},boxWidth:12,boxHeight:2,padding:16}}, tooltip:{backgroundColor:'rgba(10,10,15,0.95)',borderColor:'rgba(80,200,255,0.15)',borderWidth:1,titleFont:{family:'Outfit',size:12,weight:'600'},bodyFont:{family:'JetBrains Mono',size:11},titleColor:'#e8ecf4',bodyColor:'#7a8599',padding:12,cornerRadius:8} }, scales:{ x:{grid:{color:'rgba(255,255,255,0.03)',drawBorder:false},ticks:{color:'#4a5568',font:{family:'JetBrains Mono',size:10}},border:{display:false}}, y:{grid:{color:'rgba(255,255,255,0.03)',drawBorder:false},ticks:{color:'#4a5568',font:{family:'JetBrains Mono',size:10}},border:{display:false},...(extra.y||{})} } };
    }
    function baseDoughnutOpts() { return { responsive:true,maintainAspectRatio:false,cutout:'68%', plugins:{ legend:{position:'bottom',labels:{color:'#7a8599',font:{family:'Outfit',size:11},padding:12,boxWidth:10,boxHeight:10,usePointStyle:true}}, tooltip:{backgroundColor:'rgba(10,10,15,0.95)',borderColor:'rgba(80,200,255,0.15)',borderWidth:1,titleFont:{family:'Outfit',size:12,weight:'600'},bodyFont:{family:'JetBrains Mono',size:11},titleColor:'#e8ecf4',bodyColor:'#7a8599',padding:12,cornerRadius:8} } }; }

    function initOverviewChart(ctx, idx) {
      const id = 'ov-' + idx;
      if (chartInstances[id]) chartInstances[id].destroy();
      const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      if (idx === 0) {
        const g1=ctx.createLinearGradient(0,0,0,260); g1.addColorStop(0,'rgba(0,212,255,0.2)');g1.addColorStop(1,'rgba(0,212,255,0)');
        const g2=ctx.createLinearGradient(0,0,0,260); g2.addColorStop(0,'rgba(139,92,246,0.15)');g2.addColorStop(1,'rgba(139,92,246,0)');
        chartInstances[id] = new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'营收 (万)',data:[180,210,195,240,220,260,285,270,310,295,330,348],borderColor:'#00d4ff',backgroundColor:g1,borderWidth:2,fill:true,tension:0.4,pointRadius:0,pointHoverRadius:5},{label:'成本 (万)',data:[120,130,125,150,140,155,165,160,180,175,190,195],borderColor:'#8b5cf6',backgroundColor:g2,borderWidth:2,fill:true,tension:0.4,pointRadius:0,pointHoverRadius:5}]},options:baseLineOpts()});
      } else {
        chartInstances[id] = new Chart(ctx,{type:'doughnut',data:{labels:['自然搜索','付费推广','社交媒体','邮件营销','直接访问'],datasets:[{data:[35,25,20,12,8],backgroundColor:['#00d4ff','#8b5cf6','#f43f5e','#f59e0b','#10b981'],borderColor:'#0a0a0f',borderWidth:3,hoverOffset:6}]},options:baseDoughnutOpts()});
      }
    }
    function initSalesChart(ctx, idx) {
      const id = 's-' + idx;
      if (chartInstances[id]) chartInstances[id].destroy();
      const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      if (idx === 0) {
        chartInstances[id] = new Chart(ctx,{type:'bar',data:{labels:months,datasets:[{label:'销售额 (万)',data:[520,580,540,650,620,710,760,730,820,790,860,920],backgroundColor:'rgba(0,212,255,0.6)',borderColor:'#00d4ff',borderWidth:1,borderRadius:4},{label:'目标 (万)',data:[600,600,600,700,700,700,800,800,800,850,850,850],backgroundColor:'rgba(139,92,246,0.25)',borderColor:'#8b5cf6',borderWidth:1,borderRadius:4}]},options:baseLineOpts()});
      } else {
        chartInstances[id] = new Chart(ctx,{type:'bar',data:{labels:['华东','华南','华北','西南','华中','东北','西北'],datasets:[{label:'销售额 (万)',data:[2450,1870,1640,980,860,520,310],backgroundColor:['rgba(0,212,255,0.7)','rgba(139,92,246,0.7)','rgba(244,63,94,0.7)','rgba(245,158,11,0.7)','rgba(16,185,129,0.7)','rgba(0,212,255,0.4)','rgba(139,92,246,0.4)'],borderWidth:0,borderRadius:4}]},options:{...baseLineOpts(),indexAxis:'y',plugins:{...baseLineOpts().plugins,legend:{display:false}}}});
      }
    }
    function initUsersChart(ctx, idx) {
      const id = 'u-' + idx;
      if (chartInstances[id]) chartInstances[id].destroy();
      const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      if (idx === 0) {
